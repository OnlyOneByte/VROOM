<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta name="theme-color" content="#2563eb" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="VROOM" />
		<link rel="icon" href="/favicon.ico" sizes="48x48" />
		<link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="application-name" content="VROOM Car Tracker" />
		<meta
			name="description"
			content="Track your vehicle expenses and analyze costs with VROOM Car Tracker"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="safe-top safe-bottom">
		<script>
			(function () {
				var theme = localStorage.getItem('vroom-theme-preference') || 'system';
				var isDark =
					theme === 'dark' ||
					(theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (isDark) document.documentElement.classList.add('dark');
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
