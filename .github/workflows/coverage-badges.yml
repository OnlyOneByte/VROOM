name: Coverage Badges

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coverage:
    name: Generate Coverage Badges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Frontend coverage ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Prepare SvelteKit
        working-directory: ./frontend
        run: npm run prepare

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: npx vitest --run --coverage

      # --- Backend coverage ---
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install backend dependencies
        working-directory: ./backend
        run: bun install --frozen-lockfile

      - name: Generate Drizzle types
        working-directory: ./backend
        run: bun run db:generate

      - name: Run backend tests with coverage
        working-directory: ./backend
        run: |
          bun test --coverage 2>&1 | tee coverage-output.txt

      # --- Generate badge JSON files ---
      - name: Generate badge data
        run: |
          mkdir -p .badges

          # Frontend: read from vitest json-summary
          if [ -f frontend/coverage/coverage-summary.json ]; then
            FE_PCT=$(node -e "
              const data = require('./frontend/coverage/coverage-summary.json');
              const t = data.total;
              const avg = (t.lines.pct + t.statements.pct + t.functions.pct + t.branches.pct) / 4;
              console.log(Math.round(avg * 10) / 10);
            ")
          else
            FE_PCT="0"
          fi

          # Backend: parse bun coverage text output
          if [ -f backend/coverage-output.txt ]; then
            BE_PCT=$(grep "^All files" backend/coverage-output.txt | awk -F'|' '{gsub(/ /,"",$2); print $2}')
          else
            BE_PCT="0"
          fi

          # Color based on percentage
          get_color() {
            local pct=$1
            local int_pct=$(echo "$pct" | awk '{printf "%d", $1}')
            if [ "$int_pct" -ge 80 ]; then echo "brightgreen"
            elif [ "$int_pct" -ge 60 ]; then echo "green"
            elif [ "$int_pct" -ge 40 ]; then echo "yellowgreen"
            elif [ "$int_pct" -ge 20 ]; then echo "orange"
            else echo "red"
            fi
          }

          FE_COLOR=$(get_color "$FE_PCT")
          BE_COLOR=$(get_color "$BE_PCT")

          # Write shields.io endpoint JSON
          echo "{\"schemaVersion\":1,\"label\":\"frontend coverage\",\"message\":\"${FE_PCT}%\",\"color\":\"${FE_COLOR}\"}" > .badges/frontend-coverage.json
          echo "{\"schemaVersion\":1,\"label\":\"backend coverage\",\"message\":\"${BE_PCT}%\",\"color\":\"${BE_COLOR}\"}" > .badges/backend-coverage.json

          echo "Frontend: ${FE_PCT}% (${FE_COLOR})"
          echo "Backend: ${BE_PCT}% (${BE_COLOR})"

      - name: Deploy badges to coverage-badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy badges to temp location
          cp -r .badges /tmp/badges

          # Switch to orphan branch
          git fetch origin coverage-badges || true
          git checkout --orphan coverage-badges-tmp

          # Clean and add only badge files
          git rm -rf . || true
          cp -r /tmp/badges/* .
          git add frontend-coverage.json backend-coverage.json

          git commit -m "Update coverage badges [skip ci]"
          git push origin HEAD:coverage-badges --force
