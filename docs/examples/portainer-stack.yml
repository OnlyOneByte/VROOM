# Portainer Stack Configuration for VROOM Car Tracker
#
# Deploy via Portainer UI:
# 1. Portainer → Stacks → Add Stack
# 2. Name: vroom-production
# 3. Paste this file or use "Upload" / "Repository"
# 4. Add environment variables (see bottom of file)
# 5. Deploy the stack
#
# Cloudflare Tunnel setup:
# After deploying, configure public hostnames in Cloudflare Zero Trust dashboard:
#   /api/*  →  http://vroom-backend:3001
#   /*      →  http://vroom-frontend:3000
# Use Docker service names (not localhost) because cloudflared runs
# inside the same Docker network as the other containers.

version: '3.8'

services:
  backend:
    image: ghcr.io/onlyonebyte/vroom/backend:latest
    container_name: vroom-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - vroom-data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: /app/data/vroom.db
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_DRIVE_API_KEY: ${GOOGLE_DRIVE_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vroom-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: ghcr.io/onlyonebyte/vroom/frontend:latest
    container_name: vroom-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      PUBLIC_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vroom-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Cloudflare Tunnel — exposes the stack to the internet without port forwarding.
  # Requires a tunnel token from Cloudflare Zero Trust → Networks → Tunnels.
  # IMPORTANT: In the tunnel's public hostname config, use Docker service names:
  #   /api/*  →  http://vroom-backend:3001
  #   /*      →  http://vroom-frontend:3000
  # Do NOT use localhost — cloudflared runs in its own container.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vroom-tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - vroom-network

  # Tugtainer — lightweight container auto-updater (checks hourly).
  # Pulls new images for containers with the watchtower label enabled.
  # Remove this service if you prefer manual updates.
  tugtainer:
    image: quenary/tugtainer:latest
    container_name: vroom-tugtainer
    ports:
      - "${TUGTAINER_PORT:-3002}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SCHEDULE: "0 */1 * * *"
    restart: unless-stopped
    networks:
      - vroom-network

volumes:
  vroom-data:
    driver: local

networks:
  vroom-network:
    driver: bridge

# ============================================================================
# REQUIRED ENVIRONMENT VARIABLES (Add in Portainer UI → Environment variables)
# ============================================================================
#
# GOOGLE_CLIENT_ID=your_google_client_id
# GOOGLE_CLIENT_SECRET=your_google_client_secret
# GOOGLE_REDIRECT_URI=https://yourdomain.com/api/v1/auth/callback/google
# SESSION_SECRET=your_secure_session_secret_at_least_32_chars
# FRONTEND_URL=https://yourdomain.com
# CORS_ORIGINS=https://yourdomain.com
# PUBLIC_API_URL=https://yourdomain.com
# CLOUDFLARE_TUNNEL_TOKEN=eyJhIjoi...your_tunnel_token
#
# ============================================================================
# OPTIONAL ENVIRONMENT VARIABLES
# ============================================================================
#
# GOOGLE_DRIVE_API_KEY=          # For Google Drive backup features
# BACKEND_PORT=3001              # Host port for backend
# FRONTEND_PORT=3000             # Host port for frontend
# TUGTAINER_PORT=3002            # Host port for Tugtainer dashboard
# LOG_LEVEL=warn                 # error, warn, info, debug
